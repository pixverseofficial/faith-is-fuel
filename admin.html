<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Faith Is Fuel</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

.admin-container{
    width:90%;
    max-width:1200px;
    margin:80px auto;
}

.admin-title{
    text-align:center;
    margin-bottom:50px;
}

.admin-title h1{
    font-size:3rem;
    color:#c4d83f;
}

.admin-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:30px;
}

.admin-card{
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:30px;
}

.admin-card h2{
    margin-bottom:20px;
    color:#c4d83f;
}

.admin-input,
.admin-textarea{
    width:100%;
    padding:15px;
    margin-bottom:15px;

    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);

    border-radius:15px;

    color:white;
}

.admin-textarea{
    min-height:150px;
    resize:vertical;
}

.admin-file{
    margin-bottom:20px;
}

.admin-btn{
    width:100%;
    padding:15px;

    border:none;
    border-radius:999px;

    background:#c4d83f;
    color:#111;

    font-weight:700;
    cursor:pointer;
}

.admin-btn:hover{
    transform:translateY(-3px);
}

.status-box{
    margin-top:15px;
    color:#c4d83f;
}

</style>

</head>

<body>

<div class="admin-container">

<div class="admin-title">
<h1>Faith Is Fuel Admin</h1>
<p>Manage Reels and Articles</p>
</div>

<div class="admin-grid">

<!-- REELS -->

<div class="admin-card">

<h2>Upload Reel</h2>

<input
type="text"
id="reelTitle"
placeholder="Reel Title"
class="admin-input">

<textarea
id="reelDescription"
placeholder="Reel Description..."
class="admin-textarea"
style="min-height:120px;"></textarea>

<input
type="text"
id="reelLink"
placeholder="Instagram Reel Link"
class="admin-input">

<button
class="admin-btn"
onclick="addReel()">

Publish Reel

</button>

<div id="reelStatus"
class="status-box"></div>

</div>

<!-- ARTICLE -->

<div class="admin-card">

<h2>Upload Article</h2>

<input
type="text"
id="articleTitle"
placeholder="Article Title"
class="admin-input">

<textarea
id="articleContent"
placeholder="Article Content..."
class="admin-textarea"></textarea>

<button
class="admin-btn"
onclick="addArticle()">

Publish Article

</button>

<div id="articleStatus"
class="status-box"></div>

</div>

<div class="admin-card">

<h2>All Articles</h2>

<div id="articlesList">

Loading articles...

</div>

</div>

<div class="admin-card">

<h2>All Reels</h2>

<div id="reelsList">

Loading reels...

</div>

</div>

</div>

</div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "./js/firebase.js";

window.addReel = async function(){

const title =
document.getElementById("reelTitle").value;

const description =
document.getElementById("reelDescription").value;

const link =
document.getElementById("reelLink").value;

if(
title.trim()==="" ||
description.trim()==="" ||
link.trim()===""
){
document.getElementById("reelStatus")
.innerHTML="❌ Fill all fields";
return;
}

try{

await addDoc(
collection(db,"reels"),
{
title:title,
description:description,
link:link,
createdAt:Date.now()
}
);

document.getElementById("reelStatus")
.innerHTML =
"✅ Reel Published Successfully";

document.getElementById("reelTitle").value="";
document.getElementById("reelDescription").value="";
document.getElementById("reelLink").value="";

loadReels();

}
catch(error){

document.getElementById("reelStatus")
.innerHTML =
"❌ Upload Failed";

console.log(error);

}

}

window.addArticle = async function(){
    

const title =
document.getElementById("articleTitle").value;

const content =
document.getElementById("articleContent").value;

if(
title.trim()==="" ||
content.trim()===""
){
document.getElementById("articleStatus")
.innerHTML="❌ Fill all fields";
return;
}

try{

await addDoc(
collection(db,"articles"),
{
title:title,
content:content,
createdAt:Date.now()
}
);

document.getElementById("articleStatus")
.innerHTML=
"✅ Article Published Successfully";

document.getElementById("articleTitle").value="";
document.getElementById("articleContent").value="";

loadArticles();

}
catch(error){

document.getElementById("articleStatus")
.innerHTML=
"❌ Upload Failed";

console.log(error);

}

}

async function loadArticles(){

const snapshot =
await getDocs(collection(db,"articles"));

const articlesList =
document.getElementById("articlesList");

articlesList.innerHTML = "";

snapshot.forEach(articleDoc => {

const article = articleDoc.data();

articlesList.innerHTML += `

<div style="margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px;">

<h4>${article.title}</h4>

<button onclick="deleteArticle('${articleDoc.id}')">
Delete
</button>

</div>

`;

});

}

async function loadReels(){

const snapshot =
await getDocs(collection(db,"reels"));

const reelsList =
document.getElementById("reelsList");

reelsList.innerHTML = "";

snapshot.forEach(reelDoc => {

const reel = reelDoc.data();

reelsList.innerHTML += `

<div style="margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px;">

<h4>${reel.title}</h4>

<button onclick="deleteReel('${reelDoc.id}')">
Delete
</button>

</div>

`;

});

}

loadArticles();
loadReels();

window.deleteArticle = async function(id){

await deleteDoc(
doc(db,"articles",id)
);

loadArticles();

}

window.deleteReel = async function(id){

await deleteDoc(
doc(db,"reels",id)
);

loadReels();

}

</script>

</body>
</html>
