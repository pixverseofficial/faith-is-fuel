<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Faith Is Fuel</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

.admin-container{
    width:90%;
    max-width:1200px;
    margin:80px auto;
}

.admin-title{
    text-align:center;
    margin-bottom:50px;
}

.admin-title h1{
    font-size:3rem;
    color:#c4d83f;
}

.admin-stats{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    max-width:500px;
    margin:0 auto 50px;
}

.stat-card{
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:25px;
    text-align:center;
}

.stat-card h3{
    font-size:2.5rem;
    color:#c4d83f;
    margin-bottom:5px;
}

.stat-card p{
    color:#bdbdbd;
    font-size:1rem;
}

.admin-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
}

.admin-card{
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:30px;
}

.admin-card h2{
    margin-bottom:20px;
    color:#c4d83f;
}

.admin-input,
.admin-textarea{
    width:100%;
    padding:15px;
    margin-bottom:15px;

    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);

    border-radius:15px;

    color:white;
}

.admin-textarea{
    min-height:150px;
    resize:vertical;
}

.admin-file{
    margin-bottom:20px;
}

.admin-btn{
    width:100%;
    padding:15px;

    border:none;
    border-radius:999px;

    background:#c4d83f;
    color:#111;

    font-weight:700;
    cursor:pointer;
}

.admin-btn:hover{
    transform:translateY(-3px);
}

.status-box{
    margin-top:15px;
    color:#c4d83f;
}

.delete-btn{
    padding:8px 18px;
    border:none;
    border-radius:999px;
    background:#ff4444;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    font-size:.9rem;
}

.delete-btn:hover{
    transform:translateY(-2px);
    background:#ff0000;
    box-shadow:0 0 20px rgba(255,68,68,.4);
}

.login-screen{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    backdrop-filter:blur(20px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.login-card{
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:40px;
    width:100%;
    max-width:400px;
    text-align:center;
}

.login-logo{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
    box-shadow:0 0 30px rgba(196,216,63,.5);
}

.login-card h2{
    color:#c4d83f;
    margin-bottom:25px;
    font-size:1.8rem;
}

.login-card input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:15px;
    color:white;
    font-size:1rem;
}

.login-card input:focus{
    outline:none;
    border-color:#c4d83f;
}

.login-card button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:999px;
    background:#c4d83f;
    color:#111;
    font-weight:700;
    font-size:1.1rem;
    cursor:pointer;
    transition:.3s;
}

.login-card button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 30px rgba(196,216,63,.5);
}

#loginError{
    color:#ff5b5b;
    margin-top:15px;
    font-size:.9rem;
}

@media(max-width:900px){
    .admin-stats{
        grid-template-columns:1fr;
        max-width:300px;
    }
    .admin-grid{
        grid-template-columns:1fr;
    }
    .login-card{
        padding:30px 20px;
        margin:20px;
    }
}

</style>

</head>

<body>

<div id="loginScreen" class="login-screen">

    <div class="login-card">

        <img src="assets/logo.png" class="login-logo">

        <h2>Faith Is Fuel Admin</h2>

        <input
        type="text"
        id="loginUser"
        placeholder="Username"
        onkeypress="if(event.key==='Enter') checkLogin()">

        <input
        type="password"
        id="loginPass"
        placeholder="Password"
        onkeypress="if(event.key==='Enter') checkLogin()">

        <button onclick="checkLogin()">
            Login
        </button>

        <p id="loginError"></p>

    </div>

</div>

<div id="adminPanel" style="display:none;">

<div class="admin-container">

<div class="admin-title">
<h1>Faith Is Fuel Admin</h1>
<p>Manage Reels and Articles</p>
</div>

<div class="admin-stats">

<div class="stat-card">
<h3 id="totalArticles">0</h3>
<p>Articles</p>
</div>

<div class="stat-card">
<h3 id="totalReels">0</h3>
<p>Reels</p>
</div>

</div>

<div class="admin-grid">

<!-- Upload Reel -->

<div class="admin-card">

<h2>Upload Reel</h2>

<input
type="text"
id="reelTitle"
placeholder="Reel Title"
class="admin-input">

<textarea
id="reelDescription"
placeholder="Reel Description..."
class="admin-textarea"
style="min-height:120px;"></textarea>

<input
type="text"
id="reelLink"
placeholder="Instagram Reel Link"
class="admin-input">

<button
class="admin-btn"
onclick="addReel()">

Publish Reel

</button>

<div id="reelStatus"
class="status-box"></div>

</div>

<!-- Upload Article -->

<div class="admin-card">

<h2>Upload Article</h2>

<input
type="text"
id="articleTitle"
placeholder="Article Title"
class="admin-input">

<textarea
id="articleContent"
placeholder="Article Content..."
class="admin-textarea"></textarea>

<button
class="admin-btn"
onclick="addArticle()">

Publish Article

</button>

<div id="articleStatus"
class="status-box"></div>

</div>

<!-- All Articles -->

<div class="admin-card">

<h2>All Articles</h2>

<div id="articlesList">

Loading articles...

</div>

</div>

<!-- All Reels -->

<div class="admin-card">

<h2>All Reels</h2>

<div id="reelsList">

Loading reels...

</div>

</div>

</div>

</div>

</div>

<script>

function checkLogin(){

    const user =
    document.getElementById("loginUser").value;

    const pass =
    document.getElementById("loginPass").value;

    if(
        user === "hellofaith" &&
        pass === "faith123"
    ){

        document.getElementById("loginScreen")
        .style.display = "none";

        document.getElementById("adminPanel")
        .style.display = "block";

    }else{

        document.getElementById("loginError")
        .innerHTML = "Invalid Username or Password";

    }

}

</script>

<script type="module">

import {
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "./js/firebase.js";

async function updateStats(){
    const articlesSnapshot = await getDocs(collection(db,"articles"));
    const reelsSnapshot = await getDocs(collection(db,"reels"));
    
    document.getElementById("totalArticles").textContent = articlesSnapshot.size;
    document.getElementById("totalReels").textContent = reelsSnapshot.size;
}

window.addReel = async function(){

const title =
document.getElementById("reelTitle").value;

const description =
document.getElementById("reelDescription").value;

const link =
document.getElementById("reelLink").value;

if(
title.trim()==="" ||
description.trim()==="" ||
link.trim()===""
){
document.getElementById("reelStatus")
.innerHTML="❌ Fill all fields";
return;
}

try{

await addDoc(
collection(db,"reels"),
{
title:title,
description:description,
link:link,
createdAt:Date.now()
}
);

document.getElementById("reelStatus")
.innerHTML =
"✅ Reel Published Successfully";

document.getElementById("reelTitle").value="";
document.getElementById("reelDescription").value="";
document.getElementById("reelLink").value="";

loadReels();
updateStats();

}
catch(error){

document.getElementById("reelStatus")
.innerHTML =
"❌ Upload Failed";

console.log(error);

}

}

window.addArticle = async function(){
    

const title =
document.getElementById("articleTitle").value;

const content =
document.getElementById("articleContent").value;

if(
title.trim()==="" ||
content.trim()===""
){
document.getElementById("articleStatus")
.innerHTML="❌ Fill all fields";
return;
}

try{

await addDoc(
collection(db,"articles"),
{
title:title,
content:content,
createdAt:Date.now()
}
);

document.getElementById("articleStatus")
.innerHTML=
"✅ Article Published Successfully";

document.getElementById("articleTitle").value="";
document.getElementById("articleContent").value="";

loadArticles();
updateStats();

}
catch(error){

document.getElementById("articleStatus")
.innerHTML=
"❌ Upload Failed";

console.log(error);

}

}

async function loadArticles(){

const snapshot =
await getDocs(collection(db,"articles"));

const articlesList =
document.getElementById("articlesList");

articlesList.innerHTML = "";

if(snapshot.empty){
articlesList.innerHTML = "No Articles Found";
return;
}

snapshot.forEach(articleDoc => {

const article = articleDoc.data();

articlesList.innerHTML += `

<div style="margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px;">

<h4>${article.title}</h4>

<button
class="delete-btn"
onclick="deleteArticle('${articleDoc.id}')">

<i class="fa-solid fa-trash"></i>
 Delete

</button>

</div>

`;

});

}

async function loadReels(){

const snapshot =
await getDocs(collection(db,"reels"));

const reelsList =
document.getElementById("reelsList");

reelsList.innerHTML = "";

if(snapshot.empty){
reelsList.innerHTML = "No Reels Found";
return;
}

snapshot.forEach(reelDoc => {

const reel = reelDoc.data();

reelsList.innerHTML += `

<div style="margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px;">

<h4>${reel.title}</h4>

<button
class="delete-btn"
onclick="deleteReel('${reelDoc.id}')">

<i class="fa-solid fa-trash"></i>
 Delete

</button>

</div>

`;

});

}

loadArticles();
loadReels();
updateStats();

window.deleteArticle = async function(id){

if(!confirm("Delete this article?")) return;

await deleteDoc(
doc(db,"articles",id)
);

loadArticles();
updateStats();

}

window.deleteReel = async function(id){

if(!confirm("Delete this reel?")) return;

await deleteDoc(
doc(db,"reels",id)
);

loadReels();
updateStats();

}

</script>

</body>
</html>
